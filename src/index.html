<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic DOM Explorer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header></header>
    <nav></nav>
    <main>
        <aside id="dom-tree"></aside>
        <section id="playground">
            <h2>Semantic Playground</h2>
            <div class="semantic-layout">
                <div class="semantic-element header-demo">
                    HEADER
                </div>
                <div class="semantic-element nav-demo">
                    NAV
                </div>
                <div class="semantic-element main-demo">
                    MAIN
                    <div class="main-content">
                        <div class="semantic-element article-demo">
                            ARTICLE
                        </div>
                        <div class="semantic-element aside-demo">
                            ASIDE
                        </div>
                    </div>
                    <div class="semantic-element figure-demo">
                        FIGURE
                    </div>
                </div>
                <div class="semantic-element footer-demo">
                    FOOTER
                </div>
            </div>
        </section>
        <aside id="inspector"></aside>
        <aside id="semantic-info"></aside>
    </main>
    <footer></footer>
</body>
</html>
